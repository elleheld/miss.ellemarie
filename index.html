        }

            align-items: center;
            gap: 0.75rem;

            border-radius: 12px;
            color: #f0edf5;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
        }

        .link-btn:hover {
            background: rgba(192, 162, 235, 0.15);
            border-color: rgba(192, 162, 235, 0.35);
            transform: translateY(-1px);
        }

        .link-btn:active {
            transform: translateY(0);
        }

        .link-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            opacity: 0.85;
        }

        /* ── AdSense Slot ── */
        .ad-slot {

            align-items: center;

            border-radius: 12px;
            margin: 0.35rem 0;

        }

        .ad-slot-placeholder {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.15);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* ── Bottom Social Icons ── */
        .socials {
            display: flex;
            gap: 1.25rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .social-icon {
            width: 20px;
            height: 20px;
            opacity: 0.5;
            transition: opacity 0.2s ease;
        }

        .social-icon:hover {
            opacity: 1;
        }

        /* ── Footer ── */

            font-size: 0.65rem;
            color: rgba(255,255,255,0.18);
            letter-spacing: 0.05em;
